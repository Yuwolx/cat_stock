# 매일 아침 수집기가 살아있는지 점검한다.
# 실패하면 워크플로가 실패 처리되고, GitHub이 기본 설정으로 이메일 알림을 보낸다.
# 주의: 리포에 60일간 커밋이 없으면 GitHub이 스케줄 실행을 자동 중지한다
# (Actions 탭에서 다시 켤 수 있음).
name: collector-health-check

on:
  schedule:
    # UTC 22:30 = 한국 시간 07:30, 일-목(UTC) = 월-금(KST) 아침 (장전 — 순위류는 스킵)
    - cron: "30 22 * * 0-4"
    # UTC 00:15 = 한국 시간 09:15, 월-금 개장 직후 — 일중 순위 수집기까지 전체 점검
    - cron: "15 0 * * 1-5"
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 수집기 점검
        run: python scripts/health_check.py
